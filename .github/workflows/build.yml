name: Build

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  gradle:
    name: Gradle
    strategy:
      matrix:
        java-version:
          - 17
          - 21
          - 23
        runner:
          - macos-14
          - ubuntu-24.04
          - windows-2022
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Java
        uses: actions/setup-java@v4.5.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.2.2
        with:
          add-job-summary: never

      - name: Build
        run: ./gradlew build
